<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <form action="submit" style="width: 250px; box-shadow: 0px 0px 5px black; padding: 40px; border-radius: 10px;">
        <caption>
            <h2 style="color: green;">Registration Form</h2>
        </caption>
        <label for="">First Name:</label><br>
        <input type="text" size="33" style="border-radius: 4px;"><br>
        <label for="">Last name:</label><br>
        <input type="text" size="33" style="border-radius: 4px;"><br>
        <label for="">Email:</label><br>
        <input type="password" size="33" style="border-radius: 4px;"><br>
        <label for="">Re-type password:</label><br>
        <input type="password" size="33" style="border-radius: 4px;"><br>
        <label for="">Contact:</label><br>
        <input type="tel" size="33" style="border-radius: 4px;"><br>
        <label for="">Gender:</label><br>
        <select name="" id="" style="width: 255px; border-radius: 4px;">
            <option value="">Male</option>
            <option value="">Female</option>
        </select><br><br>
        <input type="submit"
            style="width: 260px; background-color: rgba(11, 137, 11, 0.734); color: white; border-radius: 5px;">

    </form><br><br><br><br><br>
    <div style=" background-color: lightblue; width: 500px; height:auto; text-align: center; padding: 10px;">
        <form action="submit">
            <caption>
                <h2>Gym Registration Form</h2>
            </caption>
            <input type="text" placeholder="Name" style="padding: 8px; margin-right:75px;">
            <input type="radio" name="m">
            <label for="m">MALE</label>
            <input type="radio" name="m">
            <label for="m">FEMALE</label><br><br>
            <input type="email" placeholder="Email" style="padding: 8px; margin-right: 50px;">
            <input type="tel" placeholder="Phone" style="padding: 8px;"><br><br>
            <input type="number" placeholder="Your Current wieght(lbs)" style="margin-right: 50px; padding: 8px;">
            <input type="number" placeholder="Desired weight(lbs)" style="padding: 8px;"><br><br>
            <input type="number" placeholder="Height" style="padding: 8px; margin-right: 50px;">
            <input type="number" placeholder="BMI" style="padding: 8px;">
            <br><br>
            <textarea rows="3" cols="55" placeholder="Address" style="padding: 8px;"></textarea><br><br>
            <input type="text" placeholder="City" style="padding: 8px; margin-right: 50px;">
            <input type="text" placeholder="State" style="padding: 8px;"><br><br>
            <input type="number" placeholder="Zip Code" style="padding: 8px; margin-right: 50px;">
            <input type="text" placeholder="Country" style="padding: 8px;"><br><br>
            <div style="display: flex; gap: 10px;">
                <span style="margin-right: 20px;">
                    <label for="" style="margin-left: 30px;">Do you require a personal trainer?</label><br>
                    <input type="radio">Yes <br>
                    <input type="radio">No</span>
                <span>
                    <label for="">Have you been in a Gym before?</label><br>
                    <input type="radio">Yes <br>
                    <input type="radio">No</span>
            </div><br><br>
            <input type="submit"
                style="width:440px; color: white; background-color: green; border-radius: 4px; padding: 10px; "
                value="Apply">

        </form>
    </div>
</body>

</html>
